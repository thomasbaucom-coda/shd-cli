name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            label: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            label: darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package npm tarball
        run: |
          # Copy the built binary into the npm package
          cp target/${{ matrix.target }}/release/coda npm/bin/coda-native
          chmod +x npm/bin/coda-native

          # Create the tarball from the npm directory
          cd npm
          npm pack
          mv shd-*.tgz ../shd-${{ matrix.label }}.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shd-${{ matrix.label }}
          path: shd-${{ matrix.label }}.tgz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tgz
          body: |
            ## Install

            Pick the right tarball for your platform and install globally:

            ```bash
            # macOS Apple Silicon (M1/M2/M3/M4)
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/shd-darwin-arm64.tgz

            # macOS Intel
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/shd-darwin-x64.tgz

            # Linux x64
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/shd-linux-x64.tgz

            # Linux ARM64
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/shd-linux-arm64.tgz
            ```

            Then authenticate:

            ```bash
            coda auth login
            ```
